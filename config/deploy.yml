# 1001 IPFS Node - Kamal Deployment Configuration
service: 1001-ipfs

image: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>/1001-ipfs

servers:
  web:
    hosts:
      - <%= ENV["DEPLOY_HOST"] %>
    cmd: daemon --migrate=true --agent-version-suffix=docker <%= ENV["ENABLE_GC"] == "true" ? "--enable-gc" : "" %>
    options:
      cpus: <%= ENV["CONTAINER_CPUS"] || "4" %>
      memory: <%= ENV["CONTAINER_MEMORY"] || "32G" %>
      ulimit:
        - nofile=65536:65536
      publish:
        - 4001:4001
        - 4001:4001/udp

deploy_timeout: 120

proxy:
  ssl: true
  hosts:
    - <%= ENV["IPFS_HOST"] %>
  app_port: 8080
  healthcheck:
    path: /ipfs/QmUNLLsPACCz1vLxQVkXqqLX5R1X345qqfHbsf67hvA3Nn
    interval: 10
    timeout: 300

registry:
  username: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    IPFS_PROFILE: server
    ADMIN_USER: admin
    IPFS_ADMIN_HOST: <%= ENV["IPFS_ADMIN_HOST"] %>
    GATEWAY_NO_FETCH: <%= ENV["GATEWAY_NO_FETCH"] || "true" %>
    GATEWAY_DESERIALIZED_RESPONSES: <%= ENV["GATEWAY_DESERIALIZED_RESPONSES"] || "true" %>
    IPNS_RECORD_LIFETIME: <%= ENV["IPNS_RECORD_LIFETIME"] || "336h" %>
    STORAGE_MAX: <%= ENV["STORAGE_MAX"] || "30TB" %>
    CONN_MGR_HIGH_WATER: <%= ENV["CONN_MGR_HIGH_WATER"] || "900" %>
    CONN_MGR_LOW_WATER: <%= ENV["CONN_MGR_LOW_WATER"] || "600" %>
    STORAGE_GC_WATERMARK: <%= ENV["STORAGE_GC_WATERMARK"] || "90" %>
    GC_PERIOD: <%= ENV["GC_PERIOD"] || "168h" %>
    BLOOM_FILTER_SIZE: <%= ENV["BLOOM_FILTER_SIZE"] || "1048576" %>
    RESOURCE_MGR_MAX_MEMORY: <%= ENV["RESOURCE_MGR_MAX_MEMORY"] || "24GB" %>
    RESOURCE_MGR_MAX_FILE_DESCRIPTORS: <%= ENV["RESOURCE_MGR_MAX_FILE_DESCRIPTORS"] || "65536" %>
    WORKER: <%= ENV["WORKER"] || "" %>
    PIN_CIDS_FILE: <%= ENV["PIN_CIDS_FILE"] || "" %>
    PIN_CONCURRENCY: <%= ENV["PIN_CONCURRENCY"] || "20" %>
    PIN_TIMEOUT: <%= ENV["PIN_TIMEOUT"] || "2m" %>
    PIN_STATE_DIR: <%= ENV["PIN_STATE_DIR"] || "/data/ipfs/pin-state" %>
    DOWNLOAD_CIDS_FILE: <%= ENV["DOWNLOAD_CIDS_FILE"] || "" %>
    DOWNLOAD_CONCURRENCY: <%= ENV["DOWNLOAD_CONCURRENCY"] || "10" %>
    DOWNLOAD_TIMEOUT: <%= ENV["DOWNLOAD_TIMEOUT"] || "60" %>
    DOWNLOAD_OUT_DIR: <%= ENV["DOWNLOAD_OUT_DIR"] || "/data/ipfs/cars" %>
    DOWNLOAD_STATE_DIR: <%= ENV["DOWNLOAD_STATE_DIR"] || "/data/ipfs/download-state" %>
  secret:
    - ADMIN_PASSWORD_HASH

volumes:
  - <%= ENV["IPFS_VOLUME"] || "/mnt/ipfs/data" %>:/data/ipfs

ssh:
  user: root
