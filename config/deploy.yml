# 1001 IPFS Node - Kamal Deployment Configuration
service: 1001-ipfs

image: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>/1001-ipfs

servers:
  web:
    hosts:
      - <%= ENV["DEPLOY_HOST"] %>
    cmd: daemon --migrate=true --agent-version-suffix=docker <%= ENV["ENABLE_GC"] == "false" ? "" : "--enable-gc" %>
    options:
      cpus: <%= ENV["CONTAINER_CPUS"] || "2" %>
      memory: <%= ENV["CONTAINER_MEMORY"] || "6G" %>
      publish:
        - 4001:4001
        - 4001:4001/udp

proxy:
  ssl: true
  hosts:
    - <%= ENV["IPFS_HOST"] %>
  app_port: 8080
  healthcheck:
    path: /ipfs/QmUNLLsPACCz1vLxQVkXqqLX5R1X345qqfHbsf67hvA3Nn
    interval: 5
    timeout: 60

registry:
  username: <%= ENV["DOCKER_REGISTRY_USERNAME"] %>
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: amd64

env:
  clear:
    IPFS_PROFILE: server
    ADMIN_USER: admin
    IPFS_ADMIN_HOST: <%= ENV["IPFS_ADMIN_HOST"] %>
    GATEWAY_NO_FETCH: <%= ENV["GATEWAY_NO_FETCH"] || "true" %>
    GATEWAY_DESERIALIZED_RESPONSES: <%= ENV["GATEWAY_DESERIALIZED_RESPONSES"] || "true" %>
    IPNS_RECORD_LIFETIME: <%= ENV["IPNS_RECORD_LIFETIME"] || "336h" %>
    STORAGE_MAX: <%= ENV["STORAGE_MAX"] || "20GB" %>
    CONN_MGR_HIGH_WATER: <%= ENV["CONN_MGR_HIGH_WATER"] || "96" %>
    CONN_MGR_LOW_WATER: <%= ENV["CONN_MGR_LOW_WATER"] || "32" %>
    STORAGE_GC_WATERMARK: <%= ENV["STORAGE_GC_WATERMARK"] || "90" %>
    GC_PERIOD: <%= ENV["GC_PERIOD"] || "1h" %>
    RESOURCE_MGR_MAX_MEMORY: <%= ENV["RESOURCE_MGR_MAX_MEMORY"] || "4GB" %>
    RESOURCE_MGR_MAX_FILE_DESCRIPTORS: <%= ENV["RESOURCE_MGR_MAX_FILE_DESCRIPTORS"] || "4096" %>
  secret:
    - ADMIN_PASSWORD_HASH

volumes:
  - <%= ENV["IPFS_VOLUME"] || "ipfs_data" %>:/data/ipfs

ssh:
  user: root
